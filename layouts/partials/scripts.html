<script>
  // Mobile Menu Toggle
  const mobileMenuBtn = document.getElementById('mobile-menu-btn');
  const mobileMenu = document.getElementById('mobile-menu');
  const menuIcon = document.getElementById('menu-icon');
  const closeIcon = document.getElementById('close-icon');

  if (mobileMenuBtn) {
    mobileMenuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
      menuIcon.classList.toggle('hidden');
      closeIcon.classList.toggle('hidden');
    });
  }

  // Close mobile menu when clicking a link
  document.querySelectorAll('.mobile-nav-link').forEach(link => {
    link.addEventListener('click', () => {
      mobileMenu.classList.add('hidden');
      menuIcon.classList.remove('hidden');
      closeIcon.classList.add('hidden');
    });
  });

  // Language Dropdown Toggle
  const langToggle = document.getElementById('lang-toggle');
  const langMenu = document.getElementById('lang-menu');
  const langChevron = document.getElementById('lang-chevron');

  if (langToggle) {
    langToggle.addEventListener('click', () => {
      langMenu.classList.toggle('hidden');
      langChevron.classList.toggle('rotate-180');
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      if (!langToggle.contains(e.target) && !langMenu.contains(e.target)) {
        langMenu.classList.add('hidden');
        langChevron.classList.remove('rotate-180');
      }
    });
  }

  // Navbar Scroll Effect
  const navbar = document.getElementById('navbar');
  const navLogo = document.getElementById('nav-logo');
  const navLinks = document.querySelectorAll('.nav-link');
  const mobileLangToggle = document.getElementById('mobile-lang-toggle');
  const menuBtn = document.getElementById('mobile-menu-btn');

  function updateNavbar() {
    const scrolled = window.scrollY > 50;
    
    if (scrolled) {
      navbar.classList.remove('bg-transparent', 'py-6');
      navbar.classList.add('bg-[#FAFAF8]', 'shadow-sm', 'py-4');
      navLogo.classList.remove('text-white');
      navLogo.classList.add('text-[#1A1A1A]');
      navLinks.forEach(link => {
        link.classList.remove('text-white');
        link.classList.add('text-[#1A1A1A]');
      });
      if (mobileLangToggle) {
        mobileLangToggle.classList.remove('text-white');
        mobileLangToggle.classList.add('text-[#1A1A1A]');
      }
      if (menuBtn) {
        menuBtn.classList.remove('text-white');
        menuBtn.classList.add('text-[#1A1A1A]');
      }
      if (langToggle) {
        langToggle.classList.remove('text-white');
        langToggle.classList.add('text-[#1A1A1A]');
      }
    } else {
      navbar.classList.add('bg-transparent', 'py-6');
      navbar.classList.remove('bg-[#FAFAF8]', 'shadow-sm', 'py-4');
      navLogo.classList.add('text-white');
      navLogo.classList.remove('text-[#1A1A1A]');
      navLinks.forEach(link => {
        link.classList.add('text-white');
        link.classList.remove('text-[#1A1A1A]');
      });
      if (mobileLangToggle) {
        mobileLangToggle.classList.add('text-white');
        mobileLangToggle.classList.remove('text-[#1A1A1A]');
      }
      if (menuBtn) {
        menuBtn.classList.add('text-white');
        menuBtn.classList.remove('text-[#1A1A1A]');
      }
      if (langToggle) {
        langToggle.classList.add('text-white');
        langToggle.classList.remove('text-[#1A1A1A]');
      }
    }
  }

  window.addEventListener('scroll', updateNavbar);
  updateNavbar(); // Initial check

  // Gallery Lightbox
  const galleryItems = document.querySelectorAll('.gallery-item');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const lightboxClose = document.getElementById('lightbox-close');

  galleryItems.forEach(item => {
    item.addEventListener('click', () => {
      const src = item.getAttribute('data-src');
      lightboxImg.src = src;
      lightbox.classList.remove('hidden');
      // Small delay for fade-in
      setTimeout(() => {
        lightbox.classList.remove('opacity-0');
      }, 10);
      document.body.style.overflow = 'hidden';
    });
  });

  function closeLightbox() {
    lightbox.classList.add('opacity-0');
    setTimeout(() => {
      lightbox.classList.add('hidden');
      lightboxImg.src = '';
    }, 300);
    document.body.style.overflow = '';
  }

  if (lightboxClose) {
    lightboxClose.addEventListener('click', closeLightbox);
  }

  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) {
      closeLightbox();
    }
  });

  // Close lightbox with Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !lightbox.classList.contains('hidden')) {
      closeLightbox();
    }
  });

  // Contact Form Preference Toggle
  const preferenceToggle = document.getElementById('preference-toggle');
  const emailField = document.getElementById('email-field');
  const phoneField = document.getElementById('phone-field');
  const emailInput = emailField?.querySelector('input');
  const phoneInput = phoneField?.querySelector('input');

  if (preferenceToggle) {
    const options = preferenceToggle.querySelectorAll('.preference-option');
    
    options.forEach(option => {
      option.addEventListener('click', () => {
        const value = option.getAttribute('data-value');
        
        // Update visual state
        options.forEach(opt => {
          opt.classList.remove('bg-[#1A1A1A]', 'text-white');
          opt.classList.add('text-[#6B6B6B]', 'hover:text-[#1A1A1A]');
        });
        option.classList.add('bg-[#1A1A1A]', 'text-white');
        option.classList.remove('text-[#6B6B6B]', 'hover:text-[#1A1A1A]');
        
        // Update input radio
        option.querySelector('input').checked = true;
        
        // Show/hide fields
        if (value === 'email') {
          emailField.classList.remove('hidden');
          phoneField.classList.add('hidden');
          if (emailInput) emailInput.required = true;
          if (phoneInput) phoneInput.required = false;
        } else if (value === 'phone') {
          emailField.classList.add('hidden');
          phoneField.classList.remove('hidden');
          if (emailInput) emailInput.required = false;
          if (phoneInput) phoneInput.required = true;
        } else {
          emailField.classList.remove('hidden');
          phoneField.classList.remove('hidden');
          if (emailInput) emailInput.required = true;
          if (phoneInput) phoneInput.required = true;
        }
      });
    });
  }

  // Form Submission
  const contactForm = document.getElementById('contact-form');
  const formSuccess = document.getElementById('form-success');
  const submitBtn = document.getElementById('submit-btn');

  if (contactForm) {
    contactForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      submitBtn.disabled = true;
      const originalText = submitBtn.textContent;
      submitBtn.textContent = submitBtn.dataset.loadingText || '...';
      
      const formData = new FormData(contactForm);
      const action = contactForm.getAttribute('action');
      
      try {
        const response = await fetch(action, {
          method: 'POST',
          body: formData,
          headers: {
            'Accept': 'application/json'
          }
        });
        
        if (response.ok) {
          const result = await response.json();
          contactForm.classList.add('hidden');
          formSuccess.classList.remove('hidden');
          console.log('Submission ID:', result.id);
        } else {
          const error = await response.json().catch(() => ({}));
          throw new Error(error.error || 'Form submission failed');
        }
      } catch (error) {
        console.error('Error:', error);
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
        alert(error.message || 'There was an error submitting the form. Please try again.');
      }
    });
  }
</script>
