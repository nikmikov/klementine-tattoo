<section class="relative h-screen min-h-[600px] flex flex-col justify-center">
  <div class="absolute inset-0 z-0 hero-background" aria-hidden="true"></div>

  <!-- Content -->
  <div class="z-10 w-full max-w-7xl mx-auto px-6 lg:px-12 flex flex-col items-start hero-content">
    <h1 class="font-serif text-6xl md:text-8xl lg:text-9xl text-[#1A1A1A] tracking-wide mb-4 opacity-90">
      {{ i18n "hero_name" }}
    </h1>
    <p class="font-sans text-lg md:text-xl text-[#1A1A1A] tracking-[0.2em] font-light mb-12 uppercase">
      {{ i18n "hero_sub" }}
    </p>
    
    <a 
      href="#contact" 
      class="inline-flex items-center group font-sans text-sm md:text-base tracking-widest text-[#1A1A1A] uppercase"
    >
      <span class="border-b border-[#1A1A1A] pb-1 transition-colors duration-300">
        {{ i18n "hero_cta" }}
      </span>
      <svg class="w-5 h-5 ml-3 transform group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M17 8l4 4m0 0l-4 4m4-4H3" />
      </svg>
    </a>
  </div>
</section>
