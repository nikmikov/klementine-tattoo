<section id="contact" class="py-32 px-6 lg:px-12 bg-[#FAFAF8] text-[#1A1A1A]">
  <div class="max-w-3xl mx-auto">
    <div class="text-center mb-20">
      <h2 class="font-serif text-4xl md:text-5xl lg:text-6xl text-[#1A1A1A] tracking-wide mb-6">
        {{ i18n "contact_title" }}
      </h2>
      <p class="font-sans text-[#6B6B6B] font-light">
        {{ i18n "contact_sub" }}
      </p>
    </div>

    <!-- Success Message (hidden by default) -->
    <div id="form-success" class="hidden text-center">
      <div class="w-16 h-16 rounded-full border border-[#1A1A1A] flex items-center justify-center mx-auto mb-8">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <h2 class="font-serif text-3xl md:text-4xl text-[#1A1A1A] tracking-wide mb-6">
        {{ i18n "success_msg" }}
      </h2>
    </div>

    <form id="contact-form" class="space-y-16" action="/api/submit" method="POST" enctype="multipart/form-data">
      <!-- Full Name -->
      <div>
        <label class="block font-sans text-xs tracking-widest text-[#6B6B6B] uppercase mb-4">{{ i18n "form_name_label" }} *</label>
        <input 
          type="text" 
          name="fullName"
          required
          class="w-full bg-transparent border-b border-[#E8E5E0] pb-3 focus:outline-none focus:border-[#1A1A1A] transition-colors placeholder:text-[#6B6B6B]/50 font-sans text-sm md:text-base"
        />
      </div>

      <!-- Contact Preference Toggle -->
      <div>
        <label class="block font-sans text-xs tracking-widest text-[#6B6B6B] uppercase mb-4">{{ i18n "form_preference_label" }} *</label>
        <div class="flex w-full max-w-sm border border-[#E8E5E0] p-1 bg-white" id="preference-toggle">
          <label class="preference-option flex-1 text-center py-2 px-4 font-sans text-xs uppercase tracking-widest cursor-pointer transition-all duration-300 bg-[#1A1A1A] text-white" data-value="email">
            <input type="radio" name="preference" value="email" checked class="hidden" />
            {{ i18n "preference_email" }}
          </label>
          <label class="preference-option flex-1 text-center py-2 px-4 font-sans text-xs uppercase tracking-widest cursor-pointer transition-all duration-300 text-[#6B6B6B] hover:text-[#1A1A1A]" data-value="phone">
            <input type="radio" name="preference" value="phone" class="hidden" />
            {{ i18n "preference_phone" }}
          </label>
          <label class="preference-option flex-1 text-center py-2 px-4 font-sans text-xs uppercase tracking-widest cursor-pointer transition-all duration-300 text-[#6B6B6B] hover:text-[#1A1A1A]" data-value="both">
            <input type="radio" name="preference" value="both" class="hidden" />
            {{ i18n "preference_both" }}
          </label>
        </div>
      </div>

      <!-- Email / Phone Inputs -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="contact-fields">
        <div id="email-field">
          <label class="block font-sans text-xs tracking-widest text-[#6B6B6B] uppercase mb-4">{{ i18n "form_email_label" }} *</label>
          <input 
            type="email" 
            name="email"
            class="w-full bg-transparent border-b border-[#E8E5E0] pb-3 focus:outline-none focus:border-[#1A1A1A] transition-colors placeholder:text-[#6B6B6B]/50 font-sans text-sm md:text-base"
          />
        </div>
        <div id="phone-field" class="hidden">
          <label class="block font-sans text-xs tracking-widest text-[#6B6B6B] uppercase mb-4">{{ i18n "form_phone_label" }} *</label>
          <input 
            type="tel" 
            name="phone"
            class="w-full bg-transparent border-b border-[#E8E5E0] pb-3 focus:outline-none focus:border-[#1A1A1A] transition-colors placeholder:text-[#6B6B6B]/50 font-sans text-sm md:text-base"
          />
        </div>
      </div>

      <!-- Description -->
      <div>
        <label class="block font-sans text-xs tracking-widest text-[#6B6B6B] uppercase mb-4">{{ i18n "form_desc_label" }} *</label>
        <textarea 
          name="description"
          rows="4"
          required
          class="w-full bg-transparent border-b border-[#E8E5E0] pb-3 focus:outline-none focus:border-[#1A1A1A] transition-colors placeholder:text-[#6B6B6B]/50 font-sans text-sm md:text-base resize-none"
        ></textarea>
      </div>

      <!-- Existing Tattoos -->
      <div>
        <label class="block font-sans text-xs tracking-widest text-[#6B6B6B] uppercase mb-4">{{ i18n "form_existing_label" }}</label>
        <textarea 
          name="existingTattoos"
          rows="2"
          class="w-full bg-transparent border-b border-[#E8E5E0] pb-3 focus:outline-none focus:border-[#1A1A1A] transition-colors placeholder:text-[#6B6B6B]/50 font-sans text-sm md:text-base resize-none"
        ></textarea>
      </div>

      <!-- Uploads -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div>
          <label class="block font-sans text-xs tracking-widest text-[#6B6B6B] uppercase mb-4">{{ i18n "form_photo_label" }}</label>
          <div class="relative border border-dashed border-[#E8E5E0] p-6 text-center hover:border-[#1A1A1A] transition-colors cursor-pointer group">
            <input 
              type="file" 
              name="photo"
              accept="image/*"
              class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
            />
            <svg class="w-5 h-5 mx-auto mb-2 text-[#6B6B6B] group-hover:text-[#1A1A1A]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <span class="font-sans text-xs text-[#6B6B6B] group-hover:text-[#1A1A1A]">Upload photo</span>
          </div>
        </div>
        
        <div>
          <label class="block font-sans text-xs tracking-widest text-[#6B6B6B] uppercase mb-4">{{ i18n "form_reference_label" }}</label>
          <div class="relative border border-dashed border-[#E8E5E0] p-6 text-center hover:border-[#1A1A1A] transition-colors cursor-pointer group">
            <input 
              type="file" 
              name="reference"
              accept="image/*"
              class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
            />
            <svg class="w-5 h-5 mx-auto mb-2 text-[#6B6B6B] group-hover:text-[#1A1A1A]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <span class="font-sans text-xs text-[#6B6B6B] group-hover:text-[#1A1A1A]">Upload reference</span>
          </div>
        </div>
      </div>

      <!-- Palette & Style Radios -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
        <div>
          <label class="block font-sans text-xs tracking-widest text-[#6B6B6B] uppercase mb-4">{{ i18n "form_palette_label" }}</label>
          <div class="space-y-4">
            <label class="flex items-center space-x-3 cursor-pointer group">
              <div class="relative flex items-center justify-center w-4 h-4 rounded-full border border-[#1A1A1A]">
                <input type="radio" name="palette" value="black" class="peer hidden" />
                <div class="w-2 h-2 rounded-full bg-[#1A1A1A] opacity-0 peer-checked:opacity-100 transition-opacity"></div>
              </div>
              <span class="font-sans text-sm">{{ i18n "palette_black" }}</span>
            </label>
            <label class="flex items-center space-x-3 cursor-pointer group">
              <div class="relative flex items-center justify-center w-4 h-4 rounded-full border border-[#1A1A1A]">
                <input type="radio" name="palette" value="color" class="peer hidden" />
                <div class="w-2 h-2 rounded-full bg-[#1A1A1A] opacity-0 peer-checked:opacity-100 transition-opacity"></div>
              </div>
              <span class="font-sans text-sm">{{ i18n "palette_color" }}</span>
            </label>
          </div>
        </div>

        <div>
          <label class="block font-sans text-xs tracking-widest text-[#6B6B6B] uppercase mb-4">{{ i18n "form_style_label" }}</label>
          <div class="space-y-4">
            <label class="flex items-center space-x-3 cursor-pointer group">
              <div class="relative flex items-center justify-center w-4 h-4 rounded-full border border-[#1A1A1A]">
                <input type="radio" name="style" value="linework" class="peer hidden" />
                <div class="w-2 h-2 rounded-full bg-[#1A1A1A] opacity-0 peer-checked:opacity-100 transition-opacity"></div>
              </div>
              <span class="font-sans text-sm">{{ i18n "style_linework" }}</span>
            </label>
            <label class="flex items-center space-x-3 cursor-pointer group">
              <div class="relative flex items-center justify-center w-4 h-4 rounded-full border border-[#1A1A1A]">
                <input type="radio" name="style" value="shadow" class="peer hidden" />
                <div class="w-2 h-2 rounded-full bg-[#1A1A1A] opacity-0 peer-checked:opacity-100 transition-opacity"></div>
              </div>
              <span class="font-sans text-sm">{{ i18n "style_shadow" }}</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Best days checkboxes -->
      <div>
        <label class="block font-sans text-xs tracking-widest text-[#6B6B6B] uppercase mb-4">{{ i18n "form_days_label" }}</label>
        <div class="flex flex-wrap gap-4">
          {{ $days := slice "mon" "tue" "wed" "thu" "fri" "sat" }}
          {{ range $days }}
            <label class="cursor-pointer">
              <input type="checkbox" name="days" value="{{ . }}" class="peer hidden" />
              <div class="border border-[#E8E5E0] px-4 py-2 text-xs uppercase tracking-widest font-sans peer-checked:bg-[#1A1A1A] peer-checked:text-white peer-checked:border-[#1A1A1A] transition-colors">
                {{ i18n (printf "day_%s" .) }}
              </div>
            </label>
          {{ end }}
        </div>
      </div>

      <!-- Time & DateTime -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div>
          <label class="block font-sans text-xs tracking-widest text-[#6B6B6B] uppercase mb-4">{{ i18n "form_time_label" }}</label>
          <select name="time" class="w-full bg-transparent border-b border-[#E8E5E0] pb-3 focus:outline-none focus:border-[#1A1A1A] transition-colors placeholder:text-[#6B6B6B]/50 font-sans text-sm md:text-base appearance-none rounded-none">
            <option value="">--</option>
            <option value="morning">{{ i18n "time_morning" }}</option>
            <option value="afternoon">{{ i18n "time_afternoon" }}</option>
            <option value="evening">{{ i18n "time_evening" }}</option>
          </select>
        </div>
        <div>
          <label class="block font-sans text-xs tracking-widest text-[#6B6B6B] uppercase mb-4">{{ i18n "form_datetime_label" }}</label>
          <input type="text" name="dateTime" class="w-full bg-transparent border-b border-[#E8E5E0] pb-3 focus:outline-none focus:border-[#1A1A1A] transition-colors placeholder:text-[#6B6B6B]/50 font-sans text-sm md:text-base" />
        </div>
      </div>

      <!-- Budget -->
      <div>
        <label class="block font-sans text-xs tracking-widest text-[#6B6B6B] uppercase mb-4">{{ i18n "form_budget_label" }}</label>
        <input type="text" name="budget" class="w-full bg-transparent border-b border-[#E8E5E0] pb-3 focus:outline-none focus:border-[#1A1A1A] transition-colors placeholder:text-[#6B6B6B]/50 font-sans text-sm md:text-base" />
      </div>

      <!-- Extra Info -->
      <div>
        <label class="block font-sans text-xs tracking-widest text-[#6B6B6B] uppercase mb-4">{{ i18n "form_extra_label" }}</label>
        <textarea 
          name="extraInfo"
          rows="3"
          class="w-full bg-transparent border-b border-[#E8E5E0] pb-3 focus:outline-none focus:border-[#1A1A1A] transition-colors placeholder:text-[#6B6B6B]/50 font-sans text-sm md:text-base resize-none"
        ></textarea>
      </div>

      <!-- Hidden language field -->
      <input type="hidden" name="language" value="{{ .Site.Language.Lang }}" />

      <button 
        type="submit" 
        id="submit-btn"
        class="w-full bg-[#1A1A1A] text-white py-5 px-8 font-sans text-sm uppercase tracking-widest hover:bg-[#0D0D0D] transition-colors disabled:opacity-70 disabled:cursor-not-allowed"
      >
        {{ i18n "form_submit" }}
      </button>
    </form>
  </div>
</section>
