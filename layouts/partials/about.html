<section id="about" class="py-32 px-6 lg:px-12 bg-[#FAFAF8] text-[#1A1A1A]">
  <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-16 lg:gap-24 items-center lg:items-start">
    
    <!-- Left: Portrait -->
    <div class="w-full lg:w-1/2 aspect-[3/4] relative bg-[#D9D5CF] overflow-hidden">
      <img 
        src="images/me.jpg"
        alt="Klementina Portrait"
        class="w-full h-full object-cover grayscale opacity-90 hover:grayscale-0 transition-all duration-1000"
        loading="lazy"
        onerror="this.style.display='none'"
      />
    </div>

    <!-- Right: Text -->
    <div class="w-full lg:w-1/2 flex flex-col justify-center h-full pt-8 lg:pt-24">
      <h2 class="font-serif text-4xl md:text-5xl lg:text-6xl text-[#1A1A1A] tracking-wide mb-12">
        {{ i18n "about_title" }}
      </h2>
      
      <div class="font-sans text-[#6B6B6B] font-light leading-relaxed space-y-6 text-lg">
        <p>{{ i18n "about_bio_1" }}</p>
        <p>{{ i18n "about_bio_2" }}</p>
        <p>{{ i18n "about_bio_3" }}</p>
      </div>

      <div class="mt-16">
        <a 
          href="https://instagram.com/klementina.tattoo" 
          target="_blank" 
          rel="noopener noreferrer"
          class="inline-flex items-center space-x-3 text-[#1A1A1A] hover:text-[#6B6B6B] transition-colors font-sans text-sm tracking-widest uppercase group"
        >
          <svg class="w-4 h-4 stroke-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
          </svg>
          <span class="border-b border-transparent group-hover:border-[#6B6B6B] transition-colors pb-0.5">@klementina.tattoo</span>
        </a>
      </div>
    </div>
  </div>
</section>
