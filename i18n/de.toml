about_bio_1 = "Ich bin Klementine (Marina Davydova), eine in der Schweiz tätige Tattoo-Künstlerin mit Spezialisierung auf Fine Line, Mikrorealismus und filigrane ornamentale Arbeiten."
about_bio_2 = "Mit einem Hintergrund in klassischer Kunstausbildung und Grafikdesign lege ich in jedem Werk besonderen Wert auf Präzision, Balance und feine Details. Mein Stil ist bekannt für seine Eleganz, Weichheit und eine klare, harmonische Komposition."
about_bio_3 = "Ich entwerfe individuelle Tattoos, die persönlich, zeitlos und sorgfältig auf jede Kundin und jeden Kunden abgestimmt sind."
